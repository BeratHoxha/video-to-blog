# Render Blueprint — https://render.com/docs/blueprint-spec
# Free tier: web service + PostgreSQL only.
# Article generation runs in a background thread inside the web process
# (perform_now inside Thread.new), so Sidekiq and Redis are not needed.

services:
  # ── Web (Rails + Puma) ───────────────────────────────────────────────────────
  - type: web
    name: videoblog-web
    runtime: ruby
    region: oregon
    plan: free
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    healthCheckPath: /health
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: RAILS_MAX_THREADS
        value: "5"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: videoblog-db
          property: connectionString
      # ── You fill these in the Render dashboard ───────────────────────────────
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_BUCKET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CUSTOM_SEARCH_API_KEY
        sync: false
      - key: GOOGLE_CUSTOM_SEARCH_ENGINE_ID
        sync: false
      - key: APP_HOST
        sync: false
      - key: MAILER_FROM
        sync: false
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USERNAME
        value: resend
      - key: SMTP_PASSWORD
        sync: false
      - key: PADDLE_BILLING_ENVIRONMENT
        value: sandbox
      - key: PADDLE_BILLING_API_KEY
        sync: false
      - key: PADDLE_BILLING_CLIENT_TOKEN
        sync: false
      - key: PADDLE_BILLING_SIGNING_SECRET
        sync: false
      - key: PADDLE_PRICE_BASIC_MONTHLY
        sync: false
      - key: PADDLE_PRICE_PREMIUM_MONTHLY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false

# ── PostgreSQL ────────────────────────────────────────────────────────────────
databases:
  - name: videoblog-db
    region: oregon
    plan: free
